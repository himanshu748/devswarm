<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DevSwarm Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0B0E14; --panel:rgba(19,23,34,0.72); --border:#1F2635; --text:#E6E9F0; --dim:#8A93A6;
    --planner:#F5A623; --frontend:#22D3EE; --backend:#A78BFA; --critic:#F87171; --doctor:#4ADE80;
  }
  * { box-sizing:border-box; margin:0; }
  body {
    background:var(--bg); color:var(--text);
    font:14px/1.5 'Inter',-apple-system,sans-serif;
    height:100vh; display:flex; flex-direction:column; overflow:hidden;
  }
  .mono { font-family:'JetBrains Mono',monospace; }
  :focus-visible { outline:2px solid var(--frontend); outline-offset:2px; }

  /* header */
  header { display:flex; align-items:center; gap:20px; padding:14px 20px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .wordmark { font:700 15px 'Space Grotesk'; letter-spacing:0.22em; white-space:nowrap; }
  .wordmark em { font-style:normal; color:var(--dim); font-weight:500; }
  form { flex:1; display:flex; gap:10px; max-width:720px; }
  input#prompt {
    flex:1; background:var(--panel); border:1px solid var(--border); border-radius:8px;
    padding:9px 14px; color:var(--text); font-size:14px;
  }
  input#prompt:focus { outline:none; border-color:var(--frontend); }
  button#dispatch {
    background:var(--frontend); color:#04222A; border:0; border-radius:8px;
    padding:9px 20px; font:600 13px 'Inter'; letter-spacing:0.04em; cursor:pointer;
  }
  button#dispatch:disabled { background:var(--border); color:var(--dim); cursor:wait; }
  #status { margin-left:auto; color:var(--dim); font-size:12px; display:flex; align-items:center; gap:8px; white-space:nowrap; }
  #status::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--dim); }
  #status.live { color:var(--doctor); }
  #status.live::before { background:var(--doctor); }

  /* layout */
  main { flex:1; display:grid; grid-template-columns:1fr 300px; grid-template-rows:1fr 220px; min-height:0; }
  section { border-right:1px solid var(--border); border-bottom:1px solid var(--border); min-height:0; position:relative; }
  .zone-title {
    position:absolute; top:10px; left:14px; z-index:3;
    font:500 10px 'Space Grotesk'; letter-spacing:0.28em; color:var(--dim); text-transform:uppercase;
  }

  /* swarm graph */
  #graph { grid-row:1; grid-column:1; }
  #edges { position:absolute; inset:0; width:100%; height:100%; }
  #edges line { stroke:var(--border); stroke-width:1.5; }
  #edges line.flow { stroke-dasharray:6 8; animation:flow 0.8s linear infinite; }
  @keyframes flow { to { stroke-dashoffset:-14; } }
  .node {
    position:absolute; transform:translate(-50%,-50%); text-align:center; width:150px; z-index:2;
  }
  .node .dot {
    width:52px; height:52px; border-radius:50%; margin:0 auto 6px;
    background:var(--panel); border:1.5px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font:500 10px 'Space Grotesk'; letter-spacing:0.12em; text-transform:uppercase; color:var(--dim);
    position:relative; transition:border-color .2s, color .2s, box-shadow .2s;
  }
  .node.active .dot { border-color:var(--c); color:var(--c); box-shadow:0 0 22px color-mix(in srgb, var(--c) 40%, transparent); }
  .node.active .dot::after {
    content:''; position:absolute; inset:-7px; border-radius:50%;
    border:1px solid var(--c); animation:pulse 1.6s ease-out infinite;
  }
  @keyframes pulse { from { transform:scale(0.85); opacity:0.9; } to { transform:scale(1.35); opacity:0; } }
  .node.flagged .dot { border-color:var(--critic); box-shadow:0 0 22px color-mix(in srgb, var(--critic) 45%, transparent); }
  .node .sub { font-size:10.5px; color:var(--dim); min-height:30px; }
  .node .sub b { color:var(--c); font-weight:500; display:block; }
  .flag {
    display:inline-block; margin-top:3px; padding:1px 7px; border-radius:99px;
    background:color-mix(in srgb, var(--critic) 16%, transparent); color:var(--critic);
    font-size:9.5px; letter-spacing:0.06em;
  }

  /* trace river */
  #river { grid-row:2; grid-column:1; overflow-y:auto; padding:34px 14px 10px; }
  .empty { color:var(--dim); font-size:12px; padding:8px 2px; }
  .span-row { display:grid; grid-template-columns:190px 1fr; gap:10px; align-items:center; margin-bottom:5px; }
  .span-name { font-size:11px; color:var(--dim); text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .span-track { position:relative; height:16px; }
  .span-bar {
    position:absolute; height:100%; border-radius:3px; min-width:3px;
    background:color-mix(in srgb, var(--c) 30%, transparent); border-left:2.5px solid var(--c);
  }
  .span-bar .t { position:absolute; left:calc(100% + 7px); top:-1px; font-size:10px; color:var(--dim); white-space:nowrap; }

  /* vitals rail */
  #rail { grid-row:1 / 3; grid-column:2; border-right:0; overflow-y:auto; padding:36px 14px 14px; display:flex; flex-direction:column; gap:16px; }
  .vital-num { font:500 30px 'JetBrains Mono'; font-variant-numeric:tabular-nums; letter-spacing:-0.02em; }
  .vital-label { font-size:10.5px; color:var(--dim); letter-spacing:0.12em; text-transform:uppercase; margin-top:2px; }
  .roles { display:flex; flex-direction:column; gap:7px; }
  .role-chip {
    display:flex; align-items:center; gap:8px; padding:7px 10px;
    background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:11px;
  }
  .role-chip .swatch { width:8px; height:8px; border-radius:2px; background:var(--c); flex:none; }
  .role-chip .rname { color:var(--dim); width:62px; flex:none; text-transform:capitalize; }
  .role-chip .model { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:10.5px; }
  .badge {
    flex:none; padding:1px 6px; border-radius:99px; font-size:9px; letter-spacing:0.08em;
    background:color-mix(in srgb, var(--planner) 18%, transparent); color:var(--planner);
  }
  #feed { display:flex; flex-direction:column; gap:6px; }
  .feed-item {
    padding:7px 10px; background:var(--panel); border:1px solid var(--border);
    border-left:2.5px solid var(--c, var(--border)); border-radius:6px; font-size:11px; color:var(--dim);
  }
  .feed-item b { color:var(--text); font-weight:500; }
  .feed-item a { color:var(--frontend); font-weight:600; text-decoration:none; }

  @media (max-width:900px) {
    body { overflow:auto; height:auto; }
    main { display:flex; flex-direction:column; }
    #graph { height:380px; }
    #rail { grid-row:auto; }
    form { flex-basis:100%; order:3; max-width:none; }
    #status { margin-left:0; }
  }
  @media (max-width:480px) {
    .wordmark em { display:none; }
    .span-row { grid-template-columns:110px 1fr; }
    .span-name { font-size:9.5px; }
    .span-bar .t { display:none; }
    .node { width:110px; }
    .node .dot { width:44px; height:44px; }
    .node .sub { font-size:9.5px; }
    .vital-num { font-size:24px; }
    #graph { height:330px; }
  }
  @media (prefers-reduced-motion: reduce) {
    #edges line.flow { animation:none; stroke-dasharray:none; stroke:var(--dim); }
    .node.active .dot::after { animation:none; opacity:0.5; }
  }
</style>
</head>
<body>

<header>
  <a class="wordmark" href="/" style="color:inherit;text-decoration:none">DEVSWARM <em>// MISSION CONTROL</em></a>
  <form id="f">
    <input id="prompt" placeholder="Build me a habit-tracker app" autocomplete="off">
    <button id="dispatch">Dispatch</button>
  </form>
  <div id="status">swarm idle</div>
</header>

<main>
  <section id="graph">
    <div class="zone-title">Swarm graph</div>
    <svg id="edges" preserveAspectRatio="none"></svg>
  </section>

  <section id="river">
    <div class="zone-title">Trace river</div>
    <div class="empty" id="river-empty">no spans yet, dispatch a prompt</div>
  </section>

  <section id="rail">
    <div class="zone-title">Vitals</div>
    <div>
      <div class="vital-num mono" id="tokens">0</div>
      <div class="vital-label">tokens this generation</div>
    </div>
    <div>
      <div class="vital-num mono" id="catches" style="color:var(--critic)">0</div>
      <div class="vital-label">critic catches</div>
    </div>
    <div class="roles" id="roles"></div>
    <div>
      <div class="vital-label" style="margin-bottom:8px">Swarm doctor</div>
      <button id="doctor-btn" style="width:100%;background:color-mix(in srgb, var(--doctor) 16%, transparent);color:var(--doctor);border:1px solid color-mix(in srgb, var(--doctor) 40%, transparent);border-radius:8px;padding:8px 12px;font:600 12px 'Inter';cursor:pointer">Run diagnosis</button>
      <div id="doctor-card" style="display:none;margin-top:8px;padding:10px 12px;background:var(--panel);border:1px solid var(--border);border-left:2.5px solid var(--doctor);border-radius:8px;font-size:11.5px;color:var(--dim)"></div>
    </div>
    <div>
      <div class="vital-label" style="margin-bottom:8px">Feed</div>
      <div id="feed"><div class="empty">quiet</div></div>
    </div>
  </section>
</main>

<script>
const ROLES = ['planner','frontend','backend','critic'];
const POS = { planner:[50,16], frontend:[24,54], backend:[76,54], critic:[50,86] };
const EDGES = [['planner','frontend'],['planner','backend'],['frontend','critic'],['backend','critic']];
const graph = document.getElementById('graph');
const svg = document.getElementById('edges');
const nodes = {}, edgeEls = {}, roleTokens = {}, roleModels = {};
let totalTokens = 0, genStart = 0, timers = {};

for (const [a,b] of EDGES) {
  const l = document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',POS[a][0]+'%'); l.setAttribute('y1',POS[a][1]+'%');
  l.setAttribute('x2',POS[b][0]+'%'); l.setAttribute('y2',POS[b][1]+'%');
  svg.appendChild(l); edgeEls[a+'>'+b] = l;
}
for (const r of ROLES) {
  const n = document.createElement('div');
  n.className = 'node'; n.style.setProperty('--c', `var(--${r})`);
  n.style.left = POS[r][0]+'%'; n.style.top = POS[r][1]+'%';
  n.innerHTML = `<div class="dot">${r.slice(0,4)}</div><div class="sub" id="sub-${r}"></div>`;
  graph.appendChild(n); nodes[r] = n;
}

function chip(role, model, fb) {
  roleModels[role] = { model, fb };
  document.getElementById('roles').innerHTML = ROLES.map(r => {
    const m = roleModels[r];
    return `<div class="role-chip mono" style="--c:var(--${r})">
      <span class="swatch"></span><span class="rname">${r}</span>
      <span class="model">${m ? m.model.split('/')[1] : 'standby'}</span>
      ${m && m.fb ? '<span class="badge">FALLBACK</span>' : ''}</div>`;
  }).join('');
}
chip();

function feed(text, color, html) {
  const f = document.getElementById('feed');
  if (f.firstElementChild?.classList.contains('empty')) f.innerHTML = '';
  const d = document.createElement('div');
  d.className = 'feed-item'; if (color) d.style.setProperty('--c', `var(--${color})`);
  d.innerHTML = html || text;
  f.prepend(d);
  while (f.children.length > 8) f.lastChild.remove();
}

function setStatus(t, live) {
  const s = document.getElementById('status');
  s.textContent = t; s.classList.toggle('live', !!live);
}

function activate(role, model) {
  nodes[role].classList.add('active');
  for (const k in edgeEls) if (k.includes(role)) edgeEls[k].classList.add('flow');
  const started = Date.now();
  timers[role] = setInterval(() => {
    document.getElementById('sub-'+role).innerHTML =
      `<b>${model.split('/')[1]}</b>${((Date.now()-started)/1000).toFixed(0)}s · ${(roleTokens[role]||0).toLocaleString()} tok`;
  }, 250);
}
function deactivate(role) {
  nodes[role].classList.remove('active');
  for (const k in edgeEls) if (k.includes(role)) edgeEls[k].classList.remove('flow');
  clearInterval(timers[role]);
}

const bars = {};
const SIGNOZ_URL = 'http://localhost:8080';
function spanStart(role, model, traceId) {
  document.getElementById('river-empty')?.remove();
  const river = document.getElementById('river');
  const row = document.createElement('div');
  row.className = 'span-row';
  const name = traceId
    ? `<a class="span-name mono" href="${SIGNOZ_URL}/trace/${traceId}" target="_blank" title="Open this trace in SigNoz" style="color:inherit;text-decoration:none">llm.${role} · ${model.split('/')[1]} ↗</a>`
    : `<div class="span-name mono">llm.${role} · ${model.split('/')[1]}</div>`;
  row.innerHTML = `${name}
    <div class="span-track"><div class="span-bar" style="--c:var(--${role})"><span class="t mono"></span></div></div>`;
  river.appendChild(row); river.scrollTop = river.scrollHeight;
  const bar = row.querySelector('.span-bar');
  const t0 = Date.now();
  bars[role] = { bar, t0, live:true };
  requestAnimationFrame(function grow() {
    if (!bars[role] || bars[role].bar !== bar) return;
    const total = Math.max(Date.now() - genStart, 1);
    bar.style.left = ((t0 - genStart) / total * 100) + '%';
    bar.style.width = ((Date.now() - t0) / total * 100) + '%';
    bar.querySelector('.t').textContent = ((Date.now()-t0)/1000).toFixed(1)+'s';
    if (bars[role].live) requestAnimationFrame(grow);
  });
}
function spanEnd(role, ms, tokens) {
  if (bars[role]) {
    bars[role].live = false;
    bars[role].bar.querySelector('.t').textContent = (ms/1000).toFixed(1)+'s · '+tokens.toLocaleString()+' tok';
  }
}
function relabelSpan(role, model) {
  const row = bars[role]?.bar.closest('.span-row');
  const name = row?.querySelector('.span-name');
  if (name) name.textContent = `llm.${role} · ${model.split('/')[1]} ⚡`;
}

const es = new EventSource('/api/events');
document.getElementById('doctor-btn').addEventListener('click', async () => {
  const btn = document.getElementById('doctor-btn');
  btn.disabled = true; btn.textContent = 'Reading traces...';
  try { await fetch('/api/doctor/run', { method: 'POST' }); }
  catch { feed('', 'critic', '<b>doctor</b> diagnosis failed'); }
  btn.disabled = false; btn.textContent = 'Run diagnosis';
});

es.onmessage = (m) => {
  const e = JSON.parse(m.data);
  if (e.type === 'llm_start') { activate(e.role, e.model); chip(e.role, e.model, roleModels[e.role]?.fb); spanStart(e.role, e.model, e.traceId); }
  if (e.type === 'llm_end') {
    roleTokens[e.role] = (roleTokens[e.role]||0) + e.in + e.out;
    totalTokens += e.in + e.out;
    document.getElementById('tokens').textContent = totalTokens.toLocaleString();
    deactivate(e.role); spanEnd(e.role, e.ms, e.in + e.out);
    const sub = document.getElementById('sub-'+e.role);
    if (sub) sub.innerHTML = `<b>${e.model.split('/')[1]}</b>${(e.ms/1000).toFixed(0)}s · ${(roleTokens[e.role]||0).toLocaleString()} tok`;
  }
  if (e.type === 'fallback') { chip(e.role, e.to, true); relabelSpan(e.role, e.to); feed('', e.role, `<b>fallback promoted</b> ${e.role}: ${e.to.split('/')[1]}`); }
  if (e.type === 'critic_catch') {
    const n = +document.getElementById('catches').textContent + 1;
    document.getElementById('catches').textContent = n;
    nodes[e.target]?.classList.add('flagged');
    const sub = document.getElementById('sub-'+e.target);
    if (sub && !sub.querySelector('.flag')) sub.insertAdjacentHTML('beforeend','<span class="flag">flagged</span>');
    feed('', 'critic', `<b>critic flagged ${e.target}</b> ${e.description.slice(0,90)}`);
  }
  if (e.type === 'stage') {
    setStatus(e.stage + (e.attempt ? ' '+e.attempt : ''), true);
    if (e.stage === 'regenerating') ROLES.forEach(r => nodes[r].classList.remove('flagged'));
    if (e.stage === 'planned') feed('', 'planner', `<b>plan locked</b> ${e.plan.name}: ${e.plan.api.length} endpoints`);
  }
  if (e.type === 'doctor_diagnosis') {
    const card = document.getElementById('doctor-card');
    card.style.display = 'block';
    card.innerHTML = `<b style="color:var(--text)">${e.summary}</b>` +
      (e.applied?.length ? '<div style="margin-top:6px">' + e.applied.map(a => `→ ${a.action.replace('_',' ')} for ${a.role}: ${a.reason}`).join('<br>') + '</div>' : '<div style="margin-top:6px">no routing changes needed</div>');
    feed('', 'doctor', `<b>doctor</b> ${e.summary.slice(0,90)}`);
  }
  if (e.type === 'done') {
    setStatus('swarm idle');
    document.getElementById('dispatch').disabled = false;
    ROLES.forEach(r => { deactivate(r); nodes[r].classList.remove('flagged'); });
    feed('', 'doctor', `<b>${e.verdict}</b> · ${e.regenerations} regens · ${e.catches} catches · <a href="${e.preview}" target="_blank">open ${e.name}</a>`);
  }
  if (e.type === 'generation_error' || e.type === 'llm_error') {
    setStatus('error'); document.getElementById('dispatch').disabled = false;
    ROLES.forEach(deactivate);
    feed('', 'critic', `<b>error</b> ${e.reason?.slice(0,110) || ''}`);
  }
};

document.getElementById('f').addEventListener('submit', (ev) => {
  ev.preventDefault();
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return;
  genStart = Date.now(); totalTokens = 0;
  for (const r of ROLES) { roleTokens[r] = 0; document.getElementById('sub-'+r).innerHTML=''; }
  document.getElementById('tokens').textContent = '0';
  document.getElementById('catches').textContent = '0';
  document.getElementById('river').innerHTML = '<div class="zone-title">Trace river</div>';
  document.getElementById('dispatch').disabled = true;
  setStatus('dispatching', true);
  fetch('/api/generate', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ prompt }) })
    .catch(() => setStatus('error'));
});
</script>
</body>
</html>
